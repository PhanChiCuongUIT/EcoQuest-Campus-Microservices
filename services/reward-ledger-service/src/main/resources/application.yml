server:
  port: 8083

spring:
  application:
    name: reward-ledger-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/reward_db}
    username: ${SPRING_DATASOURCE_USERNAME:ecoquest}
    password: ${SPRING_DATASOURCE_PASSWORD:ecoquest}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

identity:
  jwt-secret: ${IDENTITY_JWT_SECRET:ecoquest-dev-secret-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info
