spring:
  application:
    name: verification-policy-grpc-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/policy_db}
    username: ${SPRING_DATASOURCE_USERNAME:ecoquest}
    password: ${SPRING_DATASOURCE_PASSWORD:ecoquest}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8090

grpc:
  server:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info

identity:
  jwt-secret: ${IDENTITY_JWT_SECRET:ecoquest-dev-secret-change-me}
